<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Golden Key Event - The Tactile Toybox</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#544600",
                    "on-surface": "#191c1e",
                    "surface-variant": "#e0e3e5",
                    "surface-container-low": "#f2f4f6",
                    "secondary": "#705d00",
                    "surface-dim": "#d8dadc",
                    "surface": "#f7f9fb",
                    "on-background": "#191c1e",
                    "on-tertiary-container": "#005313",
                    "primary-container": "#d8e2ff",
                    "inverse-surface": "#2d3133",
                    "surface-tint": "#005bc1",
                    "inverse-on-surface": "#eff1f3",
                    "on-primary-fixed": "#001a41",
                    "on-primary": "#ffffff",
                    "background": "#f7f9fb",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#005313",
                    "tertiary-container": "#94f990",
                    "on-primary-fixed-variant": "#004493",
                    "outline": "#687988",
                    "tertiary-fixed-dim": "#78dc77",
                    "secondary-fixed-dim": "#e9c400",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#544600",
                    "primary-fixed": "#d8e2ff",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "primary-fixed-dim": "#adc6ff",
                    "on-secondary-fixed": "#221b00",
                    "on-primary-container": "#004493",
                    "error-container": "#ffdad6",
                    "surface-bright": "#f7f9fb",
                    "tertiary": "#006e1c",
                    "primary": "#005bc1",
                    "outline-variant": "#b7c9d9",
                    "surface-container-high": "#e6e8ea",
                    "on-tertiary-fixed": "#002204",
                    "secondary-container": "#ffe170",
                    "surface-container": "#eceef0",
                    "on-surface-variant": "#384956",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#94f990",
                    "on-tertiary": "#ffffff",
                    "inverse-primary": "#adc6ff",
                    "secondary-fixed": "#ffe170"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .confetti-slow {
            background-image: radial-gradient(circle, #ffe170 20%, transparent 20%), radial-gradient(circle, #adc6ff 20%, transparent 20%), radial-gradient(circle, #94f990 20%, transparent 20%);
            background-size: 15px 15px, 10px 10px, 12px 12px;
            background-position: 0 0, 50px 50px, 100px 100px;
        }
        .bouncy-card {
            transform: rotate(-2deg);
        }
        .inner-shadow-button {
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-surface font-body overflow-hidden text-on-surface">
<!-- Global Layout Shell -->
<div class="relative min-h-screen w-full flex items-center justify-center p-6 md:p-12 overflow-hidden">
<!-- Animated Background Elements (Confetti & Shapes) -->
<div class="absolute inset-0 z-0 opacity-40 confetti-slow"></div>
<div class="absolute -top-20 -left-20 w-96 h-96 bg-primary-container rounded-full blur-[100px] opacity-30"></div>
<div class="absolute -bottom-20 -right-20 w-96 h-96 bg-secondary-container rounded-full blur-[100px] opacity-30"></div>
<!-- Main Content Canvas -->
<div class="relative z-10 w-full max-w-4xl flex flex-col items-center">
<!-- Shared Component: TopAppBar (Simplified/Contextual) -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_20px_40px_rgba(25,28,30,0.06)] flex justify-between items-center w-full px-12 py-6">
<div class="text-3xl font-black text-blue-700 dark:text-blue-400 tracking-tighter font-['Plus_Jakarta_Sans']">The Tactile Toybox</div>
<div class="flex gap-4">
<button class="material-symbols-outlined text-slate-500 font-medium hover:scale-105 hover:bg-slate-50 transition-all p-2 rounded-full" data-icon="help">help</button>
<button class="material-symbols-outlined text-slate-500 font-medium hover:scale-105 hover:bg-slate-50 transition-all p-2 rounded-full" data-icon="settings">settings</button>
</div>
</header>
<!-- Event Presentation Section -->
<div class="mt-20 flex flex-col items-center">
<!-- Character Celebration Asset -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-secondary-container rounded-full scale-110 blur-xl opacity-50"></div>
<img alt="Celebrating mascot" class="w-48 h-48 md:w-64 md:h-64 object-cover rounded-full border-8 border-surface-container-lowest shadow-xl" data-alt="a cute, round stylized 3D character mascot with large eyes and a joyful expression, wearing a miniature crown and throwing colorful confetti" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeR6xwGwyRp449zfr7_uCIebUAzjEP2vgvl94d3YOr5B4qG9qiUtlShnS5unGbE8MX9h1xVZR8eT7NZ90Gzgrqo2Fhu22w2TwWxNFHF1nKqRl_tNXykrOTKBfJQFDJ5PMdU2ndyG1hh2k8mfXRYG0920dKTbEiUm30DdNyYrsth7XU1yXWFhgsEE60K_fcZ-26lfbDiGuIpFd9axkBwJYuG_VA8nnKv3s30jqKNJzRQJ-jKCvuTloJfuKQbYVLG5mYIOeKU5EUiVq5"/>
<!-- Floating Badge -->
<div class="absolute -top-4 -right-4 bg-tertiary text-on-tertiary px-6 py-3 rounded-full font-headline font-bold text-lg shadow-lg rotate-12">
                        JACKPOT!
                    </div>
</div>
<!-- The Golden Key Card (The Physical Object) -->
<div class="bouncy-card bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-[0_40px_80px_rgba(25,28,30,0.12)] border border-outline-variant/15 w-full max-w-md relative overflow-hidden">
<!-- Top Ribbon Header (Property-Style Logic) -->
<div class="absolute top-0 left-0 right-0 h-4 bg-secondary"></div>
<div class="flex flex-col items-center text-center space-y-6">
<!-- Icon Reveal -->
<div class="w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-5xl" data-icon="stars" data-weight="fill" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div class="space-y-2">
<h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight">Golden Key</h1>
<p class="font-body text-on-surface-variant font-medium">Fate has chosen your path!</p>
</div>
<!-- Divider-free Tonal Section -->
<div class="w-full bg-surface-container-low rounded-lg p-8 flex flex-col items-center gap-2">
<span class="font-headline text-2xl font-bold text-tertiary">Tax Refund</span>
<span class="font-headline text-5xl font-black text-on-surface">₩200,000</span>
</div>
<p class="font-body text-on-surface-variant leading-relaxed italic">
                            "The city council found an accounting error in your favor. Enjoy the bonus capital!"
                        </p>
</div>
</div>
<!-- Interaction Zone -->
<div class="mt-12 flex flex-col items-center gap-6">
<button class="group relative px-16 py-6 bg-primary text-on-primary font-headline text-xl font-bold rounded-full transition-all active:scale-95 inner-shadow-button hover:scale-105">
<span class="relative z-10">OK, COLLECT!</span>
<!-- Subtle Button Shine -->
<div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<button class="text-on-surface-variant font-headline font-semibold hover:text-primary transition-colors flex items-center gap-2">
                        View Details
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Hidden Canvas elements for depth -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface to-transparent z-0"></div>
</div>
<!-- Background Decoration (Floating Props) -->
<div class="fixed top-1/4 -left-12 opacity-20 rotate-12 -z-10">
<span class="material-symbols-outlined text-9xl text-secondary" data-icon="key">key</span>
</div>
<div class="fixed bottom-1/4 -right-12 opacity-20 -rotate-12 -z-10">
<span class="material-symbols-outlined text-9xl text-primary" data-icon="payments">payments</span>
</div>
<!-- Shared Component: BottomNavBar (Suppressed based on Transactional Rule) -->
<!-- This is a focus screen, navigation is hidden to prioritize the event content -->
</body></html>
