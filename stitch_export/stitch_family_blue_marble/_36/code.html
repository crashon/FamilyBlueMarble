<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubbly-text {
            text-shadow: 0 8px 0 rgba(0, 91, 193, 0.2), 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-panel {
            background: rgba(247, 249, 251, 0.85);
            backdrop-filter: blur(24px);
        }
        .floating-reward {
            transform: rotate(-2deg);
        }
        .particle-heart { color: #ba1a1a; position: absolute; opacity: 0.6; }
        .particle-star { color: #705d00; position: absolute; opacity: 0.8; }

<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover blur-md scale-105 opacity-40" data-alt="vibrant cosmic board game landscape with glowing nebula paths, stylized planets, and soft purple and blue ambient lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBA8QMld5MN1F3JOGmBbwEB7QTK5CdgWkSiSCqGHOTbAS68ssCD0FNWbatc-6ZIRq4ph__nw-tzaPfJrywrQHUHPaJZ_OgbqGQbhPYZxDTveF0-08cHtQ0ZSI9bORs153Wq3KD5oq4ko-vKChAhbHdOjwR1WSwX1E-mcMG5Mqi9lWJKN_jzpRsqE5ALf17IXwkbXE8ZEj07Ev88WrDUvnYo6kmTan9S-moCKMmcxC_m4mU8u6fzaVLBjZW8kBzzKilekqnskwfpBpua"/>

<div class="absolute inset-0 pointer-events-none overflow-hidden">
<span class="material-symbols-outlined particle-heart text-4xl top-[15%] left-[20%]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined particle-star text-3xl top-[25%] right-[15%]" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="material-symbols-outlined particle-heart text-2xl bottom-[30%] left-[10%]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined particle-star text-5xl bottom-[20%] right-[25%]" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="material-symbols-outlined particle-heart text-3xl top-[40%] right-[30%]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined particle-star text-2xl top-[10%] left-[45%]" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<!-- Central Character Action -->
<div class="relative mb-8">
<!-- Confetti/Burst Backdrop -->
<div class="absolute inset-0 -m-20 bg-gradient-to-t from-primary-container/0 via-secondary-container/30 to-primary-container/0 rounded-full blur-3xl"></div>
<div class="relative z-20 w-64 h-64 md:w-80 md:h-80 rounded-full bg-surface-container-lowest shadow-[0_30px_60px_rgba(0,91,193,0.15)] overflow-hidden p-2">

</div>
</div>

<h1 class="font-headline font-black text-5xl md:text-7xl lg:text-8xl text-primary bubbly-text tracking-tighter">
                HEROIC ASSIST!
            </h1>
<p class="font-headline text-xl md:text-2xl font-bold text-secondary-fixed-dim uppercase tracking-widest">
                YOU'RE A LIFESAVER!
            </p>
</div>
<!-- Reward Display Card -->
<div class="floating-reward mb-12 transform hover:rotate-0 transition-transform duration-500">
<div class="glass-panel p-8 md:p-10 rounded-xl shadow-[0_20px_40px_rgba(25,28,30,0.1)] flex flex-col md:flex-row gap-8 items-center border border-white/50">
<!-- Credit Reward -->
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="text-left">
<p class="text-sm font-bold text-outline uppercase tracking-wider">Credits Earned</p>
<p class="text-3xl font-black text-on-surface font-headline">+200</p>
</div>
</div>
<!-- Vertical Divider (Visual Only) -->
<div class="hidden md:block w-px h-12 bg-outline-variant/30"></div>
<!-- Harmony Reward -->
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="text-left">
<p class="text-sm font-bold text-outline uppercase tracking-wider">Harmony Points</p>
<p class="text-3xl font-black text-on-surface font-headline">+150</p>
</div>
</div>
</div>
</div>
<!-- Call to Action -->
<div class="group">
<button class="bg-primary hover:bg-surface-tint text-on-primary font-headline font-extrabold text-xl md:text-2xl px-12 py-6 rounded-full shadow-[0_10px_0_#004493,0_20px_40px_rgba(0,91,193,0.3)] group-active:translate-y-2 group-active:shadow-none transition-all duration-150 flex items-center gap-3">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
                YOU'RE WELCOME!
            </button>
</div>

<!-- Shell Components -->

</button>
</div>
</nav>

<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-300">

<span class="font-['Be_Vietnam_Pro'] text-[12px] font-bold">Board</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-bold">Trade</span>
</div>
<div class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-200 rounded-[2rem] px-6 py-2 active:scale-90 transition-all duration-300">

</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="local_mall">local_mall</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-bold">Shop</span>
