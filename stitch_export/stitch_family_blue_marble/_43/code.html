<style>

        .nebula-mesh {
            background-image: radial-gradient(at 0% 0%, #005bc1 0, transparent 50%),

                              radial-gradient(at 100% 0%, #ba1a1a 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.15;

        .motion-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            width: 100%;
            position: absolute;
            opacity: 0.3;
        }
    
        @keyframes warp-speed {
            0% { transform: translateX(-100%) skewX(-45deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateX(200%) skewX(-45deg); opacity: 0; }
        }
        @keyframes nebula-pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.1); }
        }
        .animate-warp-fast {
            animation: warp-speed 0.7s linear infinite;
        }
        .animate-nebula-fast {
