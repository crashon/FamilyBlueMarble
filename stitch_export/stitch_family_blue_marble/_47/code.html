<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .perspective-lg {
            perspective: 2000px;
        }
        .rotate-card {
            transform: rotateX(10deg) rotateY(-5deg) rotateZ(1deg);
        }
        .warp-streak {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }
        /* Overriding tailwind animation defaults for faster tempo */
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; transform: scale(1.5); }
            50% { opacity: .5; transform: scale(1.7); }
        }
        .animate-pulse-fast {
            animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes bounce-fast {
            0%, 100% { transform: translateY(-15%) rotate(6deg); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: translateY(0) rotate(6deg); animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-bounce-fast {
            animation: bounce-fast 0.6s infinite;
        }
        .entry-anim {
            animation: entry-scale 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes entry-scale {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e6e8ea",
                        "tertiary-fixed-dim": "#78dc77",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary": "#006e1c",
                        "inverse-primary": "#adc6ff",
                        "secondary": "#705d00",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#544600",
                        "on-tertiary-container": "#005313",
                        "on-surface": "#191c1e",
                        "background": "#f7f9fb",
                        "on-secondary-fixed": "#221b00",
                        "surface-variant": "#e0e3e5",
                        "outline": "#687988",
                        "surface-container": "#eceef0",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#94f990",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#94f990",
                        "on-tertiary-fixed": "#002204",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed": "#ffe170",
                        "on-background": "#191c1e",
                        "on-surface-variant": "#384956",
                        "on-error-container": "#93000a",
                        "surface": "#f7f9fb",
                        "primary": "#005bc1",
                        "surface-container-highest": "#e0e3e5",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#544600",
                        "inverse-surface": "#2d3133",
                        "on-primary-fixed": "#001a41",
                        "surface-tint": "#005bc1",
                        "primary-container": "#d8e2ff",
                        "outline-variant": "#b7c9d9",
                        "secondary-fixed-dim": "#e9c400",
                        "secondary-container": "#ffe170",
                        "on-primary-container": "#004493",
                        "primary-fixed-dim": "#adc6ff",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#005313",
                        "inverse-on-surface": "#eff1f3",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f2f4f6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl shadow-[0_20px_40px_rgba(25,28,30,0.06)] flex justify-between items-center px-6 py-4">
<div class="text-2xl font-black text-blue-700 dark:text-blue-400 tracking-tight font-headline">Cosmic Conquest</div>
<div class="flex items-center gap-4">
<button class="text-gray-500 hover:scale-105 transition-transform duration-150 material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</button>
<button class="text-gray-500 hover:scale-105 transition-transform duration-150 material-symbols-outlined" data-icon="settings">settings</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex items-center justify-center p-6 overflow-hidden bg-surface-container-low">
<!-- Background Game Board (Blurred) -->
<div class="absolute inset-0 opacity-40 blur-2xl scale-110 pointer-events-none">
<div class="grid grid-cols-6 grid-rows-6 h-full w-full p-12 gap-4">
<div class="bg-primary/20 rounded-lg"></div>
<div class="bg-secondary/20 rounded-lg"></div>
<div class="bg-tertiary/20 rounded-lg"></div>
<div class="bg-primary-container rounded-lg"></div>
<div class="bg-surface-variant rounded-lg"></div>
<div class="bg-primary/20 rounded-lg"></div>
<div class="col-start-6 row-start-6 bg-secondary/20 rounded-lg"></div>
</div>
<img class="absolute inset-0 w-full h-full object-cover mix-blend-overlay" data-alt="Abstract cinematic view of a stylized board game space station with neon blue and purple lights and geometric cosmic tiles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_uaYXA7Q9u2cdkcZ-nlUm3YSDROlwLuXOitvGFEdbz6QynCpIXbhcHFu5OEmCgDLBMtL5rHye89gRdHebsAvk2ctsWdaSlsl6eTMjtURtAX97uskBT4OPasQPf21aq4E3D34z6IBHFnXynqRDo39cwX7h01__aUaFw_FFBA-Q5u2y8-Y6Rp9_2V0jW_1tnkTzgin_Bwm54eNrTwvH37PcGihXqS1jnrgKNliYqiLi-FN9exLfkgBq-irzUZ4A58WAcGg7d4fskDG4"/>
</div>
<!-- Cosmic Nebula & Warp Effects -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/30 via-transparent to-tertiary/20"></div>
<!-- Warp Streaks -->
<div class="absolute top-1/2 left-0 w-full h-px warp-streak opacity-50 -rotate-12 translate-y-[-100px]"></div>
<div class="absolute top-1/2 left-0 w-full h-px warp-streak opacity-30 rotate-45 translate-x-[200px]"></div>
<div class="absolute bottom-1/4 right-0 w-1/2 h-px warp-streak opacity-40 -rotate-6"></div>
<!-- Magic Dust -->
<div class="absolute top-1/4 left-1/3 w-2 h-2 bg-white rounded-full blur-sm animate-pulse-fast"></div>
<div class="absolute bottom-1/3 right-1/4 w-3 h-3 bg-secondary-fixed rounded-full blur-md opacity-60"></div>
</div>
<!-- The Cosmic Card Container -->
<div class="relative z-10 perspective-lg max-w-lg w-full entry-anim">
<div class="rotate-card bg-surface-container-lowest rounded-xl p-1 shadow-[0_40px_80px_rgba(0,91,193,0.15)] overflow-hidden transition-all duration-300 hover:scale-[1.03]">
<!-- Card Header -->
<div class="h-3 bg-gradient-to-r from-primary via-blue-400 to-primary"></div>
<div class="p-8 flex flex-col items-center text-center gap-6">
<!-- Cosmic Warp Icon Container -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl scale-150 animate-pulse-fast"></div>
<div class="w-32 h-32 rounded-full bg-secondary-container flex items-center justify-center relative z-10 shadow-lg border-4 border-white/50">
<span class="material-symbols-outlined text-on-secondary-container text-6xl" data-icon="rocket_launch" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
</div>
<!-- Card Typography -->
<div class="space-y-2">
<span class="text-primary font-bold tracking-widest text-sm uppercase">Event Card</span>
<h1 class="text-5xl font-black text-on-surface font-headline tracking-tighter leading-none">Cosmic Warp!</h1>
<p class="text-on-surface-variant font-medium text-lg max-w-xs mx-auto pt-2">
                        The space-time continuum ripples under your fleet. Advance <span class="text-tertiary font-extrabold italic text-xl">12 Galaxies</span> immediately.
                    </p>
</div>
<!-- Action Button -->
<div class="pt-4 w-full">
<button class="group relative w-full bg-primary hover:bg-primary/90 text-on-primary py-5 rounded-full font-headline font-extrabold text-xl shadow-[0_12px_24px_rgba(0,91,193,0.3)] transition-all duration-150 active:scale-95 overflow-hidden">
<span class="relative z-10 flex items-center justify-center gap-2">
                            GO NOW!
                            <span class="material-symbols-outlined text-2xl group-hover:translate-x-2 transition-transform duration-150" data-icon="fast_forward">fast_forward</span>
</span>
<!-- Animated Pulse Layer -->
<div class="absolute inset-0 bg-white/20 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-300"></div>
</button>
</div>
<!-- Secondary Interaction -->
<button class="text-outline hover:text-primary font-medium text-sm transition-colors duration-150 py-2">
                    Collect Warp Dust First (+200 Credits)
                </button>
</div>
<!-- Footer -->
<div class="bg-surface-container-low px-8 py-4 flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="auto_awesome">auto_awesome</span>
<span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest">Warp Probability 98%</span>
</div>
<div class="text-outline-variant text-[10px] font-medium italic">CARD #CX-701</div>
</div>
</div>
<!-- Shadow Casting -->
<div class="absolute -bottom-12 left-1/2 -translate-x-1/2 w-4/5 h-12 bg-on-surface/10 blur-3xl -z-10"></div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center justify-center bg-blue-600 text-white rounded-full p-3 shadow-lg shadow-blue-200 hover:scale-110 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="rocket_launch" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<span class="text-[10px] font-medium mt-1">Galaxy</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-blue-500 transition-colors duration-150">
<span class="material-symbols-outlined" data-icon="group_work">group_work</span>
<span class="text-[10px] font-medium mt-1 text-xs">Fleet</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-blue-500 transition-colors duration-150">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
<span class="text-[10px] font-medium mt-1 text-xs">Bank</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-blue-500 transition-colors duration-150">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
<span class="text-[10px] font-medium mt-1 text-xs">Market</span>
</div>
</nav>
<!-- Visual Enhancements (Magical Floating Elements) -->
<div class="fixed top-1/4 right-10 z-20 pointer-events-none hidden md:block">
<div class="bg-white/90 backdrop-blur p-4 rounded-xl shadow-xl rotate-6 animate-bounce-fast">
<div class="text-secondary font-black text-xs uppercase mb-1">New Reward!</div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-secondary-fixed rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed text-lg" data-icon="token" style="font-variation-settings: 'FILL' 1;">token</span>
</div>
<div class="font-headline font-bold text-lg">+1,500</div>
</div>
</div>
</div>
</body></html>
