<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-secondary": "#ffffff",
                  "error": "#ba1a1a",
                  "surface-container-lowest": "#ffffff",
                  "on-tertiary": "#ffffff",
                  "tertiary-container": "#94f990",
                  "surface-container-low": "#f2f4f6",
                  "on-error": "#ffffff",
                  "error-container": "#ffdad6",
                  "on-tertiary-fixed": "#002204",
                  "surface-bright": "#f7f9fb",
                  "primary-fixed-dim": "#adc6ff",
                  "primary-fixed": "#d8e2ff",
                  "surface-tint": "#005bc1",
                  "on-surface": "#191c1e",
                  "surface-container": "#eceef0",
                  "on-secondary-fixed": "#221b00",
                  "secondary-fixed": "#ffe170",
                  "surface": "#f7f9fb",
                  "outline-variant": "#b7c9d9",
                  "surface-container-highest": "#e0e3e5",
                  "on-primary": "#ffffff",
                  "primary-container": "#d8e2ff",
                  "on-primary-fixed": "#001a41",
                  "secondary-container": "#ffe170",
                  "tertiary": "#006e1c",
                  "inverse-on-surface": "#eff1f3",
                  "outline": "#687988",
                  "on-primary-fixed-variant": "#004493",
                  "surface-dim": "#d8dadc",
                  "on-error-container": "#93000a",
                  "background": "#f7f9fb",
                  "primary": "#005bc1",
                  "on-tertiary-container": "#005313",
                  "surface-container-high": "#e6e8ea",
                  "on-tertiary-fixed-variant": "#005313",
                  "tertiary-fixed": "#94f990",
                  "on-secondary-container": "#544600",
                  "secondary-fixed-dim": "#e9c400",
                  "on-surface-variant": "#384956",
                  "on-secondary-fixed-variant": "#544600",
                  "on-background": "#191c1e",
                  "tertiary-fixed-dim": "#78dc77",
                  "on-primary-container": "#004493",
                  "surface-variant": "#e0e3e5",
                  "inverse-surface": "#2d3133",
                  "secondary": "#705d00",
                  "inverse-primary": "#adc6ff"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Be Vietnam Pro"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .text-glow {
      text-shadow: 0 0 20px rgba(0, 91, 193, 0.4), 0 0 40px rgba(0, 91, 193, 0.2);
    }
    .perspective-1000 {
      perspective: 1000px;
    }
    .rotate-3d {
      transform: rotateY(-10deg) rotateX(10deg);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_10px_30px_rgba(0,91,193,0.08)] flex justify-between items-center w-full px-8 py-5 fixed top-0 z-50 rounded-b-[2.5rem]">
<div class="text-2xl font-black tracking-tight text-blue-700 dark:text-blue-400 italic font-headline">
      The Tactile Toybox
    </div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 bg-primary-container px-4 py-2 rounded-full shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-headline font-bold text-on-primary-container">12,450</span>
</div>
<div class="flex items-center gap-2 bg-secondary-container px-4 py-2 rounded-full shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-headline font-bold text-on-secondary-container">Level 24</span>
</div>
<div class="hover:scale-110 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all duration-300 p-2 rounded-full cursor-pointer">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">settings</span>
</div>
<button class="bg-primary text-white font-headline font-bold py-2 px-6 rounded-full scale-95 active:scale-90 transition-transform bounce-in shadow-lg shadow-blue-400/30">
        Store
      </button>
</div>
</header>
<!-- Main Canvas: Cosmic Maze Escape -->
<main class="flex-1 relative overflow-hidden flex items-center justify-center pt-24 pb-32">
<!-- Blurred Background of Game Board -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover blur-2xl opacity-40" data-alt="Blurred top-down view of a colorful board game with isometric property tiles and playful tokens in a cosmic environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBq_rsrNA8mLwf-0SlWAgBiQSe1Fb0TAVr0U_RbFXFaxl0qMVTMrHcsQP6TmN8Sh6PNsI_8ZthBTFHMLInRBGkgISo2baaFrIF7M3ThDAXQh0kjyJrLcVdansB3QxhfL6YgpCM_oJ0wz6d549tOYjmQYz9Gf22sb_d4XxCtxVGwt0ghqKoiP9uDLYFWeCPND4EzasfvYsD8NMyLpNm6Cd8_nzHlrlBI9TLMvFavMV7uHidYhePXOd8lfJZW91dTCqjVHfPOYPRg3Pk"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-blue-900/20 to-surface"></div>
</div>
<!-- Event Container -->
<div class="relative z-10 w-full max-w-6xl px-8 flex flex-col items-center text-center">
<!-- Character/Spaceship Breakthrough Visual -->
<div class="relative mb-8 perspective-1000">
<div class="absolute -inset-10 bg-primary/20 blur-[100px] rounded-full"></div>
<div class="absolute -inset-20 bg-secondary/10 blur-[120px] rounded-full animate-pulse"></div>
<!-- The "Maze" Fragments -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 border-[20px] border-on-surface-variant/30 rounded-xl rotate-45 skew-x-12 opacity-50"></div>
<!-- Character Sprite (Representation of spaceship) -->
<div class="relative z-20 rotate-3d">
<div class="w-72 h-72 bg-gradient-to-tr from-primary to-primary-fixed rounded-[3rem] shadow-2xl flex items-center justify-center p-8 transform hover:scale-105 transition-transform duration-500">
<div class="bg-white/10 backdrop-blur-md rounded-[2.5rem] w-full h-full flex flex-col items-center justify-center border border-white/20">
<span class="material-symbols-outlined text-[8rem] text-white" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<div class="absolute -top-4 -right-4 bg-secondary text-on-secondary font-headline font-black p-4 rounded-full rotate-12 shadow-xl border-4 border-white">
                  GO!
                </div>
</div>
</div>
<!-- Sparkles/Energy Burst -->
<div class="absolute -top-10 -left-10 text-secondary-fixed animate-bounce">
<span class="material-symbols-outlined text-5xl">auto_awesome</span>
</div>
<div class="absolute top-1/2 -right-16 text-primary-fixed">
<span class="material-symbols-outlined text-6xl">flare</span>
</div>
</div>
</div>
<!-- Typography Header -->
<div class="space-y-4 max-w-2xl">
<h1 class="font-headline font-black text-7xl md:text-8xl text-primary leading-tight tracking-tighter italic text-glow drop-shadow-2xl">
          FREE AT LAST!
        </h1>
<p class="font-body text-xl md:text-2xl font-bold text-on-surface-variant/80 tracking-wide px-8">
          The engines are humming—prepare for re-entry!
        </p>
</div>
<!-- Main Action Button -->
<div class="mt-12 group">
<button class="relative bg-gradient-to-b from-primary to-primary-container text-white px-16 py-8 rounded-full shadow-[0_20px_50px_rgba(0,91,193,0.3)] transition-all duration-300 hover:scale-105 active:scale-95 flex items-center gap-4 overflow-hidden">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-headline text-2xl font-extrabold uppercase tracking-widest">Resume Journey</span>
<span class="material-symbols-outlined text-3xl font-bold">arrow_forward_ios</span>
</button>
<!-- Particle effects under button -->
<div class="flex justify-center gap-12 mt-6 opacity-40">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-3 h-3 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-15px_40px_rgba(0,0,0,0.06)]">
<!-- Board (Active Item) -->
<a class="flex flex-col items-center justify-center bg-blue-600 dark:bg-blue-500 text-white rounded-full px-8 py-3 shadow-lg shadow-blue-400/40 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-headline font-bold text-[11px] uppercase tracking-wider">Board</span>
</a>
<!-- Cards -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 transition-colors px-6" href="#">
<span class="material-symbols-outlined mb-1">style</span>
<span class="font-headline font-bold text-[11px] uppercase tracking-wider">Cards</span>
</a>
<!-- Friends -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 transition-colors px-6" href="#">
<span class="material-symbols-outlined mb-1">group</span>
<span class="font-headline font-bold text-[11px] uppercase tracking-wider">Friends</span>
</a>
<!-- Shop -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 transition-colors px-6" href="#">
<span class="material-symbols-outlined mb-1">shopping_bag</span>
<span class="font-headline font-bold text-[11px] uppercase tracking-wider">Shop</span>
</a>
</nav>
<!-- Decorative Floaters -->
<div class="fixed top-1/4 left-10 pointer-events-none opacity-20 hidden md:block">
<div class="w-16 h-16 rounded-full bg-tertiary blur-xl"></div>
</div>
<div class="fixed bottom-1/3 right-10 pointer-events-none opacity-20 hidden md:block">
<div class="w-24 h-24 rounded-full bg-secondary blur-2xl"></div>
</div>
</body></html>
