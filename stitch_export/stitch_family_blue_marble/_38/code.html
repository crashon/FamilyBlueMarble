<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Space Labyrinth - Freedom!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be_Vietnam_Pro:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#002204",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#78dc77",
                    "surface": "#f7f9fb",
                    "on-primary-container": "#004493",
                    "tertiary": "#006e1c",
                    "on-tertiary-container": "#005313",
                    "on-secondary-fixed-variant": "#544600",
                    "surface-container-high": "#e6e8ea",
                    "on-secondary-fixed": "#221b00",
                    "primary-fixed-dim": "#adc6ff",
                    "primary-fixed": "#d8e2ff",
                    "outline": "#687988",
                    "error": "#ba1a1a",
                    "secondary-container": "#ffe170",
                    "on-tertiary-fixed-variant": "#005313",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#005bc1",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#94f990",
                    "outline-variant": "#b7c9d9",
                    "on-primary-fixed-variant": "#004493",
                    "on-primary-fixed": "#001a41",
                    "inverse-on-surface": "#eff1f3",
                    "primary": "#005bc1",
                    "secondary-fixed-dim": "#e9c400",
                    "surface-container-low": "#f2f4f6",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e0e3e5",
                    "surface-bright": "#f7f9fb",
                    "on-surface": "#191c1e",
                    "inverse-surface": "#2d3133",
                    "on-error": "#ffffff",
                    "secondary": "#705d00",
                    "on-surface-variant": "#384956",
                    "on-error-container": "#93000a",
                    "surface-dim": "#d8dadc",
                    "on-secondary-container": "#544600",
                    "tertiary-fixed": "#94f990",
                    "surface-container-highest": "#e0e3e5",
                    "primary-container": "#d8e2ff",
                    "inverse-primary": "#adc6ff",
                    "background": "#f7f9fb",
                    "surface-container": "#eceef0",
                    "on-background": "#191c1e",
                    "secondary-fixed": "#ffe170"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubbly-button-shadow {
            box-shadow: 0 4px 0 0 rgba(0, 68, 147, 0.4);
        }
        .asymmetric-float {
            transform: rotate(-1.5deg);
        }
        .asymmetric-float-alt {
            transform: rotate(1.2deg);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden min-h-screen flex items-center justify-center p-4">
<!-- Top Navigation Shell Suppressed per Transactional Rule -->
<!-- Main Success Canvas -->
<main class="relative w-full max-w-2xl mx-auto flex flex-col items-center">
<!-- Radiant Background Elements -->
<div class="absolute inset-0 -z-10 flex items-center justify-center">
<div class="w-[500px] h-[500px] bg-secondary-container/40 rounded-full blur-[100px] animate-pulse"></div>
<div class="absolute w-[800px] h-[800px] bg-primary-container/20 rounded-full blur-[120px]"></div>
</div>
<!-- Hero Visual Section -->
<div class="relative w-full mb-12 flex justify-center items-center">
<!-- Confetti/Stars Graphic Layers -->
<div class="absolute -top-10 -left-10 text-secondary animate-bounce delay-75">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div class="absolute top-20 -right-5 text-tertiary animate-bounce delay-150">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<!-- Central Hero Image Component -->
<div class="relative z-10 w-72 h-72 md:w-96 md:h-96 rounded-xl overflow-hidden shadow-[0_20px_40px_rgba(25,28,30,0.1)] asymmetric-float border-8 border-surface-container-lowest">
<img alt="Space Hero Escape" class="w-full h-full object-cover" data-alt="A small playful astronaut character in a bubbly white suit emerging from a swirling dark purple nebula into a radiant golden cosmic sunrise with sparkling stars" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxqwGMYcUXOiliBGBPn4iXLOIgHT6UKpiTTIU-cqpEhACM1ikSWQ19e7101BhUehR1Lvs8m5l0TYEaAf2NkIi737r1DJwfSEOaGJcAMZe99935K7mcHpdavCLKWmICi3J4f2lSHcAJAq8hGL7udMfx9Iytj9AUSs73nTRm4o-Si-LTb5aoHY9oUhpHvFE2n8DF8z_QbOa6ViracJuPhnGu0mjbimSve0ab1WAMQRKpjjAio1E_zOAwjx8KS6K4fExSEAdOKCNRlasw"/>
<!-- Overlay Gradient for tactile depth -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/30 to-transparent"></div>
</div>
<!-- Floater Badges -->
<div class="absolute bottom-4 right-8 z-20 bg-tertiary-container text-on-tertiary-container px-6 py-3 rounded-full shadow-xl asymmetric-float-alt flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-headline font-bold text-lg">VICTORY</span>
</div>
</div>
<!-- Success Content -->
<div class="text-center space-y-6 max-w-lg z-20">
<h1 class="font-headline font-extrabold text-5xl md:text-7xl text-primary tracking-tighter leading-none">
                FREEDOM!
            </h1>
<p class="text-on-surface-variant text-lg md:text-xl font-medium px-4">
                You successfully navigated the nebula and found your way back to the main track!
            </p>
<!-- Stats Bento-ish Grid -->
<div class="grid grid-cols-2 gap-4 mt-8 w-full">
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_10px_30px_rgba(25,28,30,0.04)] flex flex-col items-center justify-center space-y-2 asymmetric-float">
<span class="material-symbols-outlined text-secondary text-3xl">timer</span>
<span class="text-on-surface-variant font-label text-sm font-bold">Turns Spent</span>
<span class="font-headline font-black text-2xl text-on-surface">3</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_10px_30px_rgba(25,28,30,0.04)] flex flex-col items-center justify-center space-y-2 asymmetric-float-alt">
<span class="material-symbols-outlined text-tertiary text-3xl">payments</span>
<span class="text-on-surface-variant font-label text-sm font-bold">Bonus Reward</span>
<span class="font-headline font-black text-2xl text-tertiary">+200 Credits</span>
</div>
</div>
<!-- Primary Action -->
<div class="pt-8 pb-12">
<button class="group relative inline-flex items-center gap-3 bg-gradient-to-b from-primary to-blue-700 text-on-primary px-10 py-5 rounded-full font-headline font-extrabold text-xl shadow-2xl transition-all hover:scale-105 active:scale-95 bubbly-button-shadow overflow-hidden">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
                    RESUME THE RACE
                    
                    <!-- Glossy Reflection Effect -->
<div class="absolute inset-0 bg-white/20 -translate-x-full group-hover:translate-x-full transition-transform duration-700 skew-x-12"></div>
</button>
</div>
</div>
<!-- Ambient Background Particles -->
<div class="fixed inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-2 h-2 bg-secondary rounded-full"></div>
<div class="absolute bottom-1/3 right-1/4 w-3 h-3 bg-primary rounded-full"></div>
<div class="absolute top-1/2 right-1/3 w-1.5 h-1.5 bg-tertiary rounded-full"></div>
<div class="absolute bottom-1/4 left-1/3 w-2 h-2 bg-error rounded-full"></div>
</div>
</main>
<!-- Navigation Shell Hidden for Transactional Focused Experience -->
</body></html>
