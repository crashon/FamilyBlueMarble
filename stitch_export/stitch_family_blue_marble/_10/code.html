<div class="fixed inset-0 z-0">

<div class="grid grid-cols-6 grid-rows-6 w-full h-full p-4 gap-4 opacity-40">

<div class="bg-primary-container rounded-lg border-4 border-primary/20"></div>
<div class="bg-surface-container-highest rounded-lg"></div>
<div class="bg-secondary-container rounded-lg border-4 border-secondary/20"></div>

<div class="relative">
<div class="absolute inset-0 scale-150 bg-secondary-container/20 blur-2xl rounded-full"></div>
<span class="material-symbols-outlined text-8xl md:text-9xl text-secondary z-10 relative" style="font-variation-settings: 'FILL' 1;">celebration</span>

<p class="font-body text-lg text-on-surface-variant max-w-md">

                    </p>

<span class="text-on-surface-variant font-bold text-sm tracking-widest uppercase opacity-50">Event #402</span>
<div class="flex -space-x-2">
<div class="w-8 h-8 rounded-full bg-primary border-2 border-surface"></div>
<div class="w-8 h-8 rounded-full bg-secondary border-2 border-surface"></div>
<div class="w-8 h-8 rounded-full bg-tertiary border-2 border-surface"></div>
</div>
</div>

</span>
<div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 rounded-full transition-opacity"></div>
</button>
</div>
