<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubbly-glow {
            box-shadow: 0 20px 40px rgba(0, 91, 193, 0.15);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    
        @keyframes float-fast {
            0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
            50% { transform: translateY(-15px) rotate(calc(var(--rot, 0deg) + 5deg)); }
        }
        @keyframes pop-in-snappy {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-float-fast {
            animation: float-fast 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }
        .animate-pop-snappy {
            animation: pop-in-snappy 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .animate-pulse-fast {
            animation: pulse-fast 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }
    </style>

<div class="absolute inset-0 pointer-events-none z-0">

<div class="absolute top-1/3 right-20 w-6 h-6 bg-secondary rounded-full opacity-40 animate-float-fast"></div>

<div class="absolute bottom-1/3 right-1/4 w-12 h-4 bg-primary-container rounded-full rotate-12 opacity-60 animate-float-fast"></div>
</div>
<!-- Event Banner -->

</div>

</div>
